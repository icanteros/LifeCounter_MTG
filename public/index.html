<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Life Counter — Multijugador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c96d;
            --gold-dark: #8a6a1f;
            --bg-deep: #0a0a0f;
            --bg-panel: #10101a;
            --bg-card: #14141f;
            --text-primary: #f0e8d5;
            --text-muted: #7a6e5e;
            --p1-accent: #3a7bd5; --p1-glow: #1a4a9a;
            --p2-accent: #c0392b; --p2-glow: #7a1a10;
            --p3-accent: #27ae60; --p3-glow: #145a32;
            --p4-accent: #8e44ad; --p4-glow: #4a1a6a;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg-deep);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── SCREENS ──────────────────────────────────────── */
        .screen { display: none; width: 100dvw; height: 100dvh; }
        .screen.active { display: flex; }

        /* ── LOBBY SCREEN ─────────────────────────────────── */
        #lobby-screen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(58,123,213,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(142,68,173,0.08) 0%, transparent 60%),
                var(--bg-deep);
        }

        .lobby-logo {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 0 60px rgba(201,168,76,0.15);
            text-align: center;
        }

        .lobby-logo span {
            display: block;
            font-size: 0.4em;
            letter-spacing: 0.4em;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        .lobby-card {
            background: #12121e;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 20px;
            padding: 36px 40px;
            width: min(420px, 92vw);
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }

        .lobby-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lobby-section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .slot-btn {
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .slot-btn .slot-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent, #444);
            box-shadow: 0 0 8px var(--accent, #444);
        }

        .slot-btn[data-slot="1"] { --accent: var(--p1-accent); }
        .slot-btn[data-slot="2"] { --accent: var(--p2-accent); }
        .slot-btn[data-slot="3"] { --accent: var(--p3-accent); }
        .slot-btn[data-slot="4"] { --accent: var(--p4-accent); }

        .slot-btn:not(.taken):hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(255,255,255,0.07);
        }

        .slot-btn.selected {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 30%, transparent);
        }

        .slot-btn.taken {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .lobby-divider {
            border: none;
            border-top: 1px solid rgba(201,168,76,0.1);
        }

        .lobby-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            color: var(--text-primary);
            text-transform: uppercase;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .lobby-input:focus { border-color: var(--gold); }
        .lobby-input::placeholder { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.15em; }

        .lobby-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lobby-btn-primary {
            background: linear-gradient(135deg, #1a0d00, #2c1800);
            color: var(--gold);
            border: 1px solid var(--gold-dark);
            box-shadow: 0 0 16px rgba(201,168,76,0.15);
        }

        .lobby-btn-primary:hover {
            background: linear-gradient(135deg, #2c1800, #4a2c00);
            box-shadow: 0 0 28px rgba(201,168,76,0.35);
        }

        .lobby-btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .lobby-btn-secondary:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.25);
        }

        .lobby-error {
            color: #ff6b6b;
            font-size: 0.82rem;
            text-align: center;
            min-height: 1.2em;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        /* ── ROOM CODE DISPLAY ────────────────────────────── */
        .room-code-display {
            background: rgba(201,168,76,0.07);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .room-code-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .room-code-value {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.35em;
            text-shadow: 0 0 20px rgba(201,168,76,0.5);
        }

        /* ── GAME SCREEN ──────────────────────────────────── */
        #game-screen {
            flex-direction: column;
        }

        #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

        #grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            flex: 1;
            gap: 3px;
            padding: 3px;
            background: var(--bg-deep);
        }

        /* ── PLAYER CARD ──────────────────────────────────── */
        .player {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            padding: 14px 10px 10px;
            transition: background 0.3s;
        }

        .player::before {
            content: '';
            position: absolute; inset: 0;
            opacity: 0.07; pointer-events: none;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
        }

        .player::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px; border-radius: 12px 12px 0 0;
        }

        .player[data-player="1"]::after { background: linear-gradient(90deg, transparent, var(--p1-accent), transparent); }
        .player[data-player="2"]::after { background: linear-gradient(90deg, transparent, var(--p2-accent), transparent); }
        .player[data-player="3"]::after { background: linear-gradient(90deg, transparent, var(--p3-accent), transparent); }
        .player[data-player="4"]::after { background: linear-gradient(90deg, transparent, var(--p4-accent), transparent); }

        .player.danger { background: #1a0808; }
        .player.danger .life-display { color: #ff6b6b !important; text-shadow: 0 0 30px #ff4444; }
        .player.disconnected { opacity: 0.45; }

        .player[data-player="1"] { --accent: var(--p1-accent); --glow: var(--p1-glow); }
        .player[data-player="2"] { --accent: var(--p2-accent); --glow: var(--p2-glow); }
        .player[data-player="3"] { --accent: var(--p3-accent); --glow: var(--p3-glow); }
        .player[data-player="4"] { --accent: var(--p4-accent); --glow: var(--p4-glow); }

        /* Connected badge */
        .conn-badge {
            position: absolute;
            top: 8px; right: 10px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #3d3d3d;
            transition: background 0.4s, box-shadow 0.4s;
        }
        .conn-badge.online {
            background: #4dff91;
            box-shadow: 0 0 8px #00cc55;
        }

        .player-name-wrap {
            display: flex; align-items: center;
            gap: 6px; width: 100%; justify-content: center;
        }

        .player-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            background: transparent; border: none; outline: none;
            width: 90%;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, color 0.2s;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .player-name:focus { border-bottom-color: var(--accent); }
        .player-name:disabled { cursor: default; }

        .life-display {
            font-family: 'Cinzel', serif;
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 900; line-height: 1;
            color: var(--text-primary);
            text-shadow: 0 0 40px var(--glow);
            transition: transform 0.1s, color 0.4s, text-shadow 0.4s;
            user-select: none; position: relative;
        }

        .life-display.bump { transform: scale(1.12); }

        .delta {
            position: absolute; top: -0.6em; right: -0.4em;
            font-size: 0.28em; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; opacity: 0; transform: translateY(0);
            transition: opacity 0.6s, transform 0.6s; pointer-events: none;
        }
        .delta.show { opacity: 1; transform: translateY(-1.2em); }
        .delta.positive { color: #4dff91; }
        .delta.negative { color: #ff5c5c; }

        .btn-row {
            display: flex; gap: 6px; align-items: center;
            justify-content: center; width: 100%;
        }

        button {
            cursor: pointer; font-family: 'Rajdhani', sans-serif;
            font-weight: 700; border: none; border-radius: 8px;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.93); }

        .btn-main {
            width: clamp(44px,12vw,72px); height: clamp(44px,10vw,64px);
            font-size: clamp(1.4rem,4vw,2.2rem);
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-main:hover { background: var(--glow); border-color: var(--accent); box-shadow: 0 0 12px var(--glow); }

        .btn-fast {
            padding: 5px 10px;
            font-size: clamp(0.65rem,2.2vw,0.85rem);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 6px;
        }
        .btn-fast:hover { color: var(--accent); border-color: var(--accent); }

        .counters-row {
            display: flex; gap: 10px;
            align-items: center; justify-content: center;
        }

        .mini-counter { display: flex; flex-direction: column; align-items: center; gap: 2px; }

        .mini-label {
            font-size: clamp(0.45rem,1.5vw,0.6rem);
            text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
        }

        .mini-controls { display: flex; align-items: center; gap: 4px; }

        .mini-val {
            font-size: clamp(0.75rem,2.5vw,1rem); font-weight: 700;
            min-width: 22px; text-align: center; color: var(--text-primary);
        }

        .btn-mini {
            width: clamp(20px,5vw,28px); height: clamp(20px,5vw,28px);
            font-size: clamp(0.75rem,2vw,1rem);
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-mini:hover { color: var(--accent); border-color: var(--accent); }

        .poison-critical .mini-val { color: #4dff91; text-shadow: 0 0 8px #00cc55; }

        /* ── BOTTOM BAR ─────────────────────────────────────── */
        #bottom-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 16px; background: #0c0c14;
            border-top: 1px solid rgba(201,168,76,0.15);
            gap: 10px; flex-shrink: 0;
        }

        #title {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.55rem,2vw,0.8rem);
            color: var(--gold); letter-spacing: 0.15em;
            text-transform: uppercase; text-shadow: 0 0 12px var(--gold-dark);
            white-space: nowrap;
        }

        #room-code-badge {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.6rem,1.8vw,0.8rem);
            color: var(--text-muted);
            letter-spacing: 0.18em;
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }

        #room-code-badge:hover { color: var(--gold); }
        #room-code-badge span { color: var(--gold); }

        #reset-btn {
            padding: 8px 18px;
            font-size: clamp(0.7rem,2vw,0.85rem);
            font-family: 'Cinzel', serif; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            background: linear-gradient(135deg, #1a0d00, #2c1800);
            color: var(--gold); border: 1px solid var(--gold-dark);
            border-radius: 8px; box-shadow: 0 0 10px rgba(201,168,76,0.2);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        #reset-btn:hover { background: linear-gradient(135deg, #2c1800, #4a2c00); box-shadow: 0 0 20px rgba(201,168,76,0.45); }
        #reset-btn:active { transform: scale(0.95); }

        /* ── CONFIRM OVERLAY ─────────────────────────────────── */
        #confirm-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        #confirm-overlay.show { opacity: 1; pointer-events: all; }

        #confirm-box {
            background: #16162a; border: 1px solid var(--gold-dark);
            border-radius: 16px; padding: 30px 36px;
            text-align: center; box-shadow: 0 0 40px rgba(201,168,76,0.25);
            max-width: 320px; width: 90%;
        }
        #confirm-box h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold); margin-bottom: 8px; }
        #confirm-box p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 22px; }

        .confirm-btns { display: flex; gap: 12px; justify-content: center; }

        #confirm-yes {
            padding: 10px 24px; font-family: 'Cinzel', serif; font-weight: 700;
            font-size: 0.85rem; letter-spacing: 0.08em;
            background: linear-gradient(135deg, #4a0000, #800000);
            color: #ffaaaa; border: 1px solid #800000; border-radius: 8px;
        }
        #confirm-yes:hover { background: linear-gradient(135deg, #700000, #aa0000); }

        #confirm-no {
            padding: 10px 24px; font-family: 'Cinzel', serif; font-weight: 700;
            font-size: 0.85rem; letter-spacing: 0.08em;
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
        }
        #confirm-no:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); }

        /* ── TOAST ───────────────────────────────────────────── */
        #toast {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #1e1e30; border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px; padding: 10px 20px;
            font-size: 0.82rem; color: var(--gold);
            letter-spacing: 0.05em; opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; white-space: nowrap; z-index: 200;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (orientation: landscape) and (min-width: 600px) {
            .player[data-player="3"],
            .player[data-player="4"] { transform: rotate(180deg); }
        }

        @media (max-width: 400px) {
            .player { gap: 6px; padding: 8px 6px 6px; }
            #bottom-bar { padding: 4px 10px; }
        }
    </style>
</head>

<body>

<!-- ── LOBBY SCREEN ──────────────────────────────────────────────────── -->
<div id="lobby-screen" class="screen active">
    <div class="lobby-logo">
        ⚔ MTG Life Counter
        <span>Multijugador en tiempo real</span>
    </div>

    <div class="lobby-card">

        <!-- CREATE ROOM -->
        <div id="create-section" class="lobby-section">
            <div class="lobby-section-title">Nueva sala</div>
            <button class="lobby-btn lobby-btn-primary" id="create-btn">Crear sala</button>
        </div>

        <hr class="lobby-divider" />

        <!-- JOIN ROOM -->
        <div class="lobby-section">
            <div class="lobby-section-title">Unirse a sala existente</div>
            <input id="code-input" class="lobby-input" type="text"
                   maxlength="5" placeholder="Código de sala" autocomplete="off" spellcheck="false" />
        </div>

        <!-- SLOT PICKER (shown after code entered or room created) -->
        <div class="lobby-section" id="slot-section" style="display:none;">
            <div class="lobby-section-title">Elegí tu lugar</div>
            <div class="slot-grid" id="slot-grid">
                <button class="slot-btn" data-slot="1"><span class="slot-dot"></span>Jugador 1</button>
                <button class="slot-btn" data-slot="2"><span class="slot-dot"></span>Jugador 2</button>
                <button class="slot-btn" data-slot="3"><span class="slot-dot"></span>Jugador 3</button>
                <button class="slot-btn" data-slot="4"><span class="slot-dot"></span>Jugador 4</button>
            </div>
        </div>

        <!-- ROOM CODE DISPLAY (after creation) -->
        <div id="room-code-section" class="room-code-display" style="display:none;">
            <span class="room-code-label">Código de sala — compartilo con tus amigos</span>
            <span class="room-code-value" id="lobby-code-value">—</span>
        </div>

        <div class="lobby-error" id="lobby-error"></div>

        <button class="lobby-btn lobby-btn-primary" id="join-btn" style="display:none;">
            Entrar al juego
        </button>

    </div>
</div>

<!-- ── GAME SCREEN ───────────────────────────────────────────────────── -->
<div id="game-screen" class="screen">
    <div id="app">
        <div id="grid"><!-- Players generated by JS --></div>
        <div id="bottom-bar">
            <span id="title">⚔ MTG Life Counter</span>
            <span id="room-code-badge" title="Clic para copiar">Sala: <span id="game-code-display"></span></span>
            <button id="reset-btn">↺ Reiniciar</button>
        </div>
    </div>

    <div id="confirm-overlay">
        <div id="confirm-box">
            <h2>¿Reiniciar partida?</h2>
            <p>Se restablecerán las vidas y contadores de todos los jugadores a 40.</p>
            <div class="confirm-btns">
                <button id="confirm-yes">Sí, reiniciar</button>
                <button id="confirm-no">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Socket.io client (served by the server) -->
<script src="/socket.io/socket.io.js"></script>

<script>
    // ─────────────────────────────────────────────
    // SOCKET
    // ─────────────────────────────────────────────
    const socket = io();

    let myRoomCode = null;
    let mySlot = null;
    let pendingCode = null;
    let pendingSlot = null;

    // ─────────────────────────────────────────────
    // SCREEN HELPERS
    // ─────────────────────────────────────────────
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showToast(msg, duration = 2200) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove('show'), duration);
    }

    // ─────────────────────────────────────────────
    // LOBBY LOGIC
    // ─────────────────────────────────────────────
    const createBtn     = document.getElementById('create-btn');
    const joinBtn       = document.getElementById('join-btn');
    const codeInput     = document.getElementById('code-input');
    const slotSection   = document.getElementById('slot-section');
    const slotGrid      = document.getElementById('slot-grid');
    const lobbyError    = document.getElementById('lobby-error');
    const roomCodeSection = document.getElementById('room-code-section');
    const lobbyCodeValue  = document.getElementById('lobby-code-value');

    let selectedSlot = null;
    let isCreating = false;

    function setLobbyError(msg) { lobbyError.textContent = msg; }
    function clearLobbyError()  { lobbyError.textContent = ''; }

    // Show slot picker
    function showSlotPicker(connectedSlots = []) {
        slotSection.style.display = '';
        joinBtn.style.display = '';
        document.querySelectorAll('.slot-btn').forEach(btn => {
            const slot = parseInt(btn.dataset.slot);
            const taken = connectedSlots.includes(slot);
            btn.classList.toggle('taken', taken);
            btn.disabled = taken;
        });
    }

    createBtn.addEventListener('click', () => {
        clearLobbyError();
        isCreating = true;
        socket.emit('create_room');
    });

    socket.on('room_created', ({ code }) => {
        myRoomCode = code;
        pendingCode = code;
        lobbyCodeValue.textContent = code;
        roomCodeSection.style.display = '';
        showSlotPicker([]);
        createBtn.style.display = 'none';
        codeInput.style.display = 'none';
        document.querySelector('#create-section .lobby-section-title').style.display = 'none';
    });

    codeInput.addEventListener('input', () => {
        codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        clearLobbyError();
        const code = codeInput.value.trim();
        if (code.length === 5) {
            pendingCode = code;
            showSlotPicker([]);
        } else {
            slotSection.style.display = 'none';
            joinBtn.style.display = 'none';
            selectedSlot = null;
            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
        }
    });

    slotGrid.addEventListener('click', e => {
        const btn = e.target.closest('.slot-btn');
        if (!btn || btn.disabled) return;
        selectedSlot = parseInt(btn.dataset.slot);
        pendingSlot = selectedSlot;
        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        clearLobbyError();
    });

    joinBtn.addEventListener('click', () => {
        if (!pendingCode) { setLobbyError('Ingresá un código de sala.'); return; }
        if (!pendingSlot) { setLobbyError('Elegí tu lugar de jugador.'); return; }
        clearLobbyError();
        socket.emit('join_room', { code: pendingCode, playerSlot: pendingSlot });
    });

    // ─────────────────────────────────────────────
    // GAME: JOIN
    // ─────────────────────────────────────────────
    socket.on('joined_room', ({ code, players, mySlot: slot }) => {
        myRoomCode = code;
        mySlot = slot;
        document.getElementById('game-code-display').textContent = code;
        buildGrid(players);
        showScreen('game-screen');
    });

    socket.on('error', ({ message }) => {
        setLobbyError(message);
    });

    // ─────────────────────────────────────────────
    // GAME GRID
    // ─────────────────────────────────────────────
    const grid = document.getElementById('grid');

    function buildGrid(players) {
        grid.innerHTML = '';
        players.forEach(p => grid.appendChild(createPlayerCard(p)));
    }

    function createPlayerCard(player) {
        const el = document.createElement('div');
        el.className = 'player';
        el.dataset.player = player.id;
        el.id = `player-${player.id}`;
        const isMe = player.id === mySlot;

        el.innerHTML = `
            <span class="conn-badge ${player.connected ? 'online' : ''}" id="conn-${player.id}"></span>
            <div class="player-name-wrap">
                <input class="player-name" type="text" value="${escHtml(player.name)}"
                       maxlength="20" aria-label="Nombre jugador ${player.id}"
                       ${isMe ? '' : 'disabled'} />
            </div>
            <div class="life-display" id="life-${player.id}">
                ${player.life}
                <span class="delta" id="delta-${player.id}"></span>
            </div>
            <div class="btn-row">
                <button class="btn-fast" data-pid="${player.id}" data-delta="-5" ${isMe ? '' : 'disabled'}>−5</button>
                <button class="btn-main" data-pid="${player.id}" data-delta="-1" ${isMe ? '' : 'disabled'}>−</button>
                <button class="btn-main" data-pid="${player.id}" data-delta="+1" ${isMe ? '' : 'disabled'}>+</button>
                <button class="btn-fast" data-pid="${player.id}" data-delta="+5" ${isMe ? '' : 'disabled'}>+5</button>
            </div>
            <div class="counters-row">
                <div class="mini-counter" id="poison-wrap-${player.id}">
                    <span class="mini-label">☠ Veneno</span>
                    <div class="mini-controls">
                        <button class="btn-mini" data-pid="${player.id}" data-type="poison" data-delta="-1" ${isMe ? '' : 'disabled'}>−</button>
                        <span class="mini-val" id="poison-${player.id}">${player.poison}</span>
                        <button class="btn-mini" data-pid="${player.id}" data-type="poison" data-delta="+1" ${isMe ? '' : 'disabled'}>+</button>
                    </div>
                </div>
                <div class="mini-counter">
                    <span class="mini-label">⚔ Cmdr</span>
                    <div class="mini-controls">
                        <button class="btn-mini" data-pid="${player.id}" data-type="commander" data-delta="-1" ${isMe ? '' : 'disabled'}>−</button>
                        <span class="mini-val" id="cmdr-${player.id}">${player.commander}</span>
                        <button class="btn-mini" data-pid="${player.id}" data-type="commander" data-delta="+1" ${isMe ? '' : 'disabled'}>+</button>
                    </div>
                </div>
            </div>
        `;

        return el;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─────────────────────────────────────────────
    // GAME STATE UPDATE (from server)
    // ─────────────────────────────────────────────
    socket.on('game_state', ({ players }) => {
        players.forEach(p => updatePlayerUI(p));
    });

    const prevLife = {};

    function updatePlayerUI(p) {
        const lifeEl    = document.getElementById(`life-${p.id}`);
        const deltaEl   = document.getElementById(`delta-${p.id}`);
        const poisonEl  = document.getElementById(`poison-${p.id}`);
        const cmdrEl    = document.getElementById(`cmdr-${p.id}`);
        const poisonWrap= document.getElementById(`poison-wrap-${p.id}`);
        const card      = document.getElementById(`player-${p.id}`);
        const connBadge = document.getElementById(`conn-${p.id}`);
        const nameInput = card ? card.querySelector('.player-name') : null;

        if (!lifeEl) return;

        // Life number
        const oldLife = prevLife[p.id];
        const delta = (oldLife !== undefined) ? (p.life - oldLife) : undefined;
        prevLife[p.id] = p.life;
        lifeEl.childNodes[0].textContent = p.life;

        // Danger
        card.classList.toggle('danger', p.life <= 5);
        card.classList.toggle('disconnected', !p.connected);

        // Delta badge
        if (delta !== undefined && delta !== 0) {
            deltaEl.textContent = (delta > 0 ? '+' : '') + delta;
            deltaEl.className = 'delta show ' + (delta > 0 ? 'positive' : 'negative');
            clearTimeout(deltaEl._t);
            deltaEl._t = setTimeout(() => deltaEl.classList.remove('show'), 1200);
        }

        // Bump
        lifeEl.classList.remove('bump');
        void lifeEl.offsetWidth;
        if (delta !== 0) lifeEl.classList.add('bump');
        clearTimeout(lifeEl._bt);
        lifeEl._bt = setTimeout(() => lifeEl.classList.remove('bump'), 120);

        // Mini counters
        poisonEl.textContent  = p.poison;
        cmdrEl.textContent    = p.commander;
        poisonWrap.classList.toggle('poison-critical', p.poison >= 10);

        // Name (only update if not focused by this user)
        if (nameInput && document.activeElement !== nameInput) {
            nameInput.value = p.name;
        }

        // Connection badge
        if (connBadge) connBadge.classList.toggle('online', p.connected);
    }

    // ─────────────────────────────────────────────
    // EVENTS: life buttons
    // ─────────────────────────────────────────────
    grid.addEventListener('click', e => {
        const btn = e.target.closest('button[data-delta]');
        if (!btn || btn.disabled) return;

        const pid   = parseInt(btn.dataset.pid);
        const type  = btn.dataset.type;
        const delta = parseInt(btn.dataset.delta);

        if (!type) {
            socket.emit('life_change', { pid, delta });
        } else {
            socket.emit('counter_change', { pid, type, delta });
        }
    });

    // ─────────────────────────────────────────────
    // EVENTS: name input
    // ─────────────────────────────────────────────
    grid.addEventListener('input', e => {
        if (!e.target.classList.contains('player-name')) return;
        if (e.target.disabled) return;
        const card = e.target.closest('.player');
        const pid  = parseInt(card.dataset.player);
        socket.emit('name_change', { pid, name: e.target.value });
    });

    // ─────────────────────────────────────────────
    // EVENTS: reset
    // ─────────────────────────────────────────────
    const overlay    = document.getElementById('confirm-overlay');
    const confirmYes = document.getElementById('confirm-yes');
    const confirmNo  = document.getElementById('confirm-no');

    document.getElementById('reset-btn').addEventListener('click', () => overlay.classList.add('show'));
    confirmNo.addEventListener('click', () => overlay.classList.remove('show'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
    confirmYes.addEventListener('click', () => {
        socket.emit('reset_game');
        overlay.classList.remove('show');
    });

    // ─────────────────────────────────────────────
    // COPY ROOM CODE
    // ─────────────────────────────────────────────
    document.getElementById('room-code-badge').addEventListener('click', () => {
        if (!myRoomCode) return;
        navigator.clipboard.writeText(myRoomCode).then(() => showToast('✓ Código copiado: ' + myRoomCode));
    });

    // ─────────────────────────────────────────────
    // TOUCH: prevent scroll/zoom on grid
    // ─────────────────────────────────────────────
    document.addEventListener('touchmove', e => {
        if (e.target.closest('#grid')) e.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
